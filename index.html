<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Título Principal -->
    <title>Gerenciamento</title>
    <meta name="description" content="Controle financeiro de empreitada e pagamentos semanais.">

    <meta property="og:title" content="Gerenciamento de Pagamentos">
    <meta property="og:description" content="Controle financeiro de obra. Valor total, pagos e saldo restante.">
    <meta property="og:image" content="https://plus.unsplash.com/premium_vector-1682305492040-a272f5d4d3db?q=80&w=1316&auto=format&fit=crop">
    <meta property="og:type" content="website">

    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="https://iili.io/q91MH3x.jpg">
    <link rel="apple-touch-icon" href="https://iili.io/q91MH3x.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #ffffff; }
        .progress-bar { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input { font-size: 16px !important; }
        .touch-target { min-height: 48px; }
        .modal { transition: opacity 0.3s ease, visibility 0.3s ease; opacity: 0; visibility: hidden; }
        .modal.active { opacity: 1; visibility: visible; }
        .modal-content { transform: scale(0.95); transition: transform 0.3s ease; }
        .modal.active .modal-content { transform: scale(1); }
        .text-gradient-shine { background: linear-gradient(to right, #0f172a, #2563eb, #3b82f6, #0f172a); background-size: 200% auto; color: transparent; -webkit-background-clip: text; background-clip: text; animation: shine 4s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        .splash-hidden { opacity: 0; pointer-events: none; visibility: hidden; }
        .animate-fade-up { animation: fadeUp 0.8s ease-out forwards; opacity: 0; transform: translateY(15px); }
        .animate-pulse-slow { animation: pulseSlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseSlow { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body class="text-slate-800 min-h-screen pb-safe">

    <!-- TELA DE INTRODUÇÃO -->
    <div id="splash-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-white transition-opacity duration-700">
        <div class="relative animate-pulse-slow">
            <div class="absolute -inset-4 bg-blue-100 rounded-full blur-xl opacity-70 animate-pulse"></div>
            <img src="https://iili.io/q91MH3x.jpg" alt="Logo" class="w-32 h-32 object-contain relative z-10 mix-blend-multiply">
        </div>
        <h1 class="mt-6 text-3xl font-extrabold text-slate-900 animate-fade-up tracking-tight">Gerenciamento</h1>
        <div class="mt-4 flex gap-1.5 animate-fade-up" style="animation-delay: 0.3s;">
            <div class="w-2.5 h-2.5 bg-blue-600 rounded-full animate-bounce"></div>
            <div class="w-2.5 h-2.5 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0.1s;"></div>
            <div class="w-2.5 h-2.5 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0.2s;"></div>
        </div>
    </div>


    
    <!-- CANVAS OCULTO PARA EXPORTAR EXCEL -->
    <canvas id="excelChartCanvas" width="600" height="600" style="display:none;"></canvas>

    <!-- MODAL DE VALOR DA EMPREITADA -->
    <div id="goalModal" class="modal fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
        <div class="modal-content bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6 border border-slate-100">
            <div class="text-center mb-6">
                <div class="bg-blue-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3 text-blue-600"><i data-lucide="briefcase" size="24"></i></div>
                <h3 class="text-lg font-bold text-slate-900">Valor da Empreitada</h3>
                <p class="text-sm text-slate-500">Defina o valor total combinado.</p>
            </div>
            <form id="goalForm">
                <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Novo Valor (R$)</label>
                <input type="number" id="goalInput" step="0.01" placeholder="0,00" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-2xl font-bold text-center text-slate-800 mb-6">
                <div class="flex gap-3">
                    <button type="button" onclick="closeGoalModal()" class="w-1/2 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition">Cancelar</button>
                    <button type="submit" class="w-1/2 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL (APP) -->
    <div id="main-app" class="max-w-xl mx-auto min-h-screen flex flex-col p-4 md:p-6 space-y-5 fade-in hidden">
        
        <div class="text-center py-6 relative">
            <img src="https://iili.io/q91MH3x.jpg" alt="Logo" class="w-32 h-32 mx-auto mb-8 object-contain mix-blend-multiply cursor-pointer transition-transform" onclick="logoClick(this)">
            <h1 class="text-2xl md:text-3xl font-extrabold leading-tight text-gradient-shine tracking-tight px-2">Gerenciamento de Pagamentos</h1>
            <button id="installAppBtn" class="hidden mt-4 bg-slate-900 text-white px-4 py-2 rounded-full text-sm font-bold shadow-lg flex items-center gap-2 mx-auto hover:bg-slate-800 transition">
                <i data-lucide="download" size="16"></i> Instalar App
            </button>
        </div>

        <div class="grid grid-cols-1 gap-3">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex justify-between items-center">
                <div>
                    <div class="flex items-center gap-2 mb-1 text-slate-500 text-xs font-bold uppercase tracking-wider"><i data-lucide="briefcase" size="14"></i> Valor Da Empreitada</div>
                    <div class="flex items-center gap-3">
                        <div class="text-3xl font-bold text-slate-800 cursor-pointer border-b border-dashed border-slate-300 hover:border-blue-500 hover:text-blue-600 transition" onclick="openGoalModal()" id="totalGoalDisplay">R$ 0,00</div>
                        <button onclick="openGoalModal()" class="bg-slate-50 p-2 rounded-full text-slate-400 hover:text-blue-600 transition active:scale-95 border border-slate-200"><i data-lucide="pencil" size="16"></i></button>
                    </div>
                </div>
                <div class="bg-slate-50 p-3 rounded-full text-slate-400 border border-slate-100"><i data-lucide="layers" size="24"></i></div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between">
                    <div class="flex items-center gap-1.5 mb-2 text-green-600 text-[10px] font-bold uppercase"><i data-lucide="check-circle" size="12"></i> Pago</div>
                    <div class="text-xl md:text-2xl font-bold text-green-600" id="totalPaidDisplay">R$ 0,00</div>
                    <p class="text-[10px] text-slate-400 mt-1" id="paymentCountDisplay">0 pgto(s)</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between relative overflow-hidden">
                    <div class="flex items-center gap-1.5 mb-2 text-slate-500 text-[10px] font-bold uppercase"><i data-lucide="trending-down" size="12"></i> Resta</div>
                    <div class="text-xl md:text-2xl font-bold text-red-600" id="remainingDisplay">R$ 0,00</div>
                    <div id="cardProgressBar" class="absolute bottom-0 left-0 h-1 bg-green-500 transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="bg-white px-5 py-4 rounded-xl shadow-sm border border-slate-200">
            <div class="flex justify-between text-xs mb-2 font-semibold text-slate-600 uppercase tracking-wide"><span>Progresso</span> <span id="progressText">0%</span></div>
            <div class="w-full bg-slate-50 rounded-full h-3 overflow-hidden border border-slate-100"><div id="mainProgressBar" class="progress-bar bg-gradient-to-r from-green-500 to-green-600 h-3 rounded-full shadow-sm" style="width: 0%"></div></div>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-md border-t-4 border-blue-600 relative transition-all duration-300" id="formContainer">
            <h2 class="text-base font-bold text-slate-800 mb-4 flex items-center gap-2" id="formTitle">
                <span class="bg-blue-50 text-blue-600 rounded-lg p-1.5 border border-blue-100"><i data-lucide="plus" size="18"></i></span> Registrar Pagamento
            </h2>
            <form id="addForm" class="flex flex-col gap-4">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="col-span-2">
                        <label class="block text-[10px] font-bold text-slate-500 mb-1.5 uppercase">Descrição</label>
                        <input type="text" id="descInput" placeholder="Ex: Semanal" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition text-sm font-medium touch-target">
                    </div>
                    <div class="col-span-1">
                        <label class="block text-[10px] font-bold text-slate-500 mb-1.5 uppercase">Data</label>
                        <input type="date" id="dateInput" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition text-sm font-medium touch-target text-slate-700">
                    </div>
                    <div class="col-span-1">
                        <label class="block text-[10px] font-bold text-slate-500 mb-1.5 uppercase">Valor (R$)</label>
                        <input type="number" id="amountInput" inputmode="decimal" step="0.01" placeholder="0,00" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition font-mono font-bold text-lg text-slate-800 touch-target">
                    </div>
                </div>
                <div class="flex gap-3">
                    <button type="button" id="cancelEditBtn" onclick="cancelEdit()" class="hidden w-1/3 bg-slate-100 text-slate-600 font-bold py-4 rounded-xl hover:bg-slate-200 border border-slate-200 flex justify-center items-center gap-2 transition active:scale-[0.98]">
                        <i data-lucide="x" size="20"></i> Cancelar
                    </button>
                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 active:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 flex justify-center items-center gap-2 touch-target transition-transform active:scale-[0.98]">
                        <i data-lucide="save" size="20"></i> Salvar Pagamento
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col flex-grow">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50 rounded-t-2xl flex-wrap gap-2">
                <h2 class="text-base font-bold text-slate-800 flex items-center gap-2 mr-auto"><i data-lucide="history" class="text-slate-400" size="18"></i> Histórico</h2>
                    <div id="secretActions" class="hidden flex gap-2 flex-wrap">
                        <button onclick="exportBackup()" class="text-[10px] font-bold bg-white text-blue-600 px-3 py-2 rounded-lg hover:bg-blue-50 transition border border-slate-200 shadow-sm flex items-center gap-2" title="Baixar Backup"><i data-lucide="download-cloud" size="14"></i> Backup</button>
                        <button onclick="triggerRestore()" class="text-[10px] font-bold bg-white text-amber-600 px-3 py-2 rounded-lg hover:bg-amber-50 transition border border-slate-200 shadow-sm flex items-center gap-2" title="Restaurar Backup"><i data-lucide="upload-cloud" size="14"></i> Restaurar</button>
                    </div>
                    <button onclick="exportToPDF()" class="text-[10px] font-bold bg-white text-red-600 px-3 py-2 rounded-lg hover:bg-red-50 transition border border-slate-200 shadow-sm flex items-center gap-2"><i data-lucide="file-text" size="14"></i> PDF</button>
                    <button onclick="exportToExcel()" class="text-[10px] font-bold bg-white text-green-600 px-3 py-2 rounded-lg hover:bg-green-50 transition border border-slate-200 shadow-sm flex items-center gap-2"><i data-lucide="file-spreadsheet" size="14"></i> Excel</button>
                    <input type="file" id="restoreFile" class="hidden" accept=".json" onchange="importBackup(event)">
                </div>
            </div>
            <div id="emptyState" class="p-10 text-center text-slate-400 flex flex-col items-center justify-center flex-grow">
                <div class="bg-slate-50 p-4 rounded-full mb-3"><i data-lucide="calendar" size="32" class="text-slate-300"></i></div>
                <p class="text-sm">Nenhum pagamento registrado.</p>
            </div>
            <div id="paymentsList" class="divide-y divide-slate-100 hidden max-h-[500px] overflow-y-auto"></div>
        </div>
    </div>
    
    <!-- LÓGICA DE PERSISTÊNCIA LOCAL (Substituindo Firebase) -->
    <script type="module">
        // Helper para o Banco de Dados Local
        const LocalDB = {
            STORAGE_KEY: 'gerenciamento_pagamentos_data',
            
            getData() {
                const data = localStorage.getItem(this.STORAGE_KEY);
                if (data) return JSON.parse(data);
                
                // Dados Iniciais (Inseridos via Assistente)
                const initialData = {
                    totalGoal: 4500, // Ajustado conforme pedido (quase 4 mil e pouco)
                    payments: [
                        { id: crypto.randomUUID(), description: "Sexta-feira", amount: 600, date: "10/04/2026", timestamp: new Date("2026-04-10T12:00:00").getTime() },
                        { id: crypto.randomUUID(), description: "Sábado", amount: 500, date: "28/03/2026", timestamp: new Date("2026-03-28T12:00:00").getTime() },
                        { id: crypto.randomUUID(), description: "Sexta-feira", amount: 300, date: "20/03/2026", timestamp: new Date("2026-03-20T12:00:00").getTime() },
                        { id: crypto.randomUUID(), description: "Sábado", amount: 500, date: "14/03/2026", timestamp: new Date("2026-03-14T12:00:00").getTime() },
                        { id: crypto.randomUUID(), description: "Terça-feira", amount: 1500, date: "03/03/2026", timestamp: new Date("2026-03-03T12:00:00").getTime() }
                    ]
                };
                this.saveData(initialData);
                return initialData;
            },
            
            saveData(data) {
                localStorage.setItem(this.STORAGE_KEY, JSON.stringify(data));
                window.dispatchEvent(new CustomEvent('db-updated'));
            },
            
            setGoal(val) {
                const data = this.getData();
                data.totalGoal = val;
                this.saveData(data);
            },
            
            addPayment(payment) {
                const data = this.getData();
                const newPayment = {
                    id: crypto.randomUUID(),
                    ...payment,
                    timestamp: payment.timestamp || Date.now()
                };
                data.payments.push(newPayment);
                data.payments.sort((a, b) => b.timestamp - a.timestamp);
                this.saveData(data);
                return newPayment;
            },
            
            updatePayment(id, updates) {
                const data = this.getData();
                const index = data.payments.findIndex(p => p.id === id);
                if (index !== -1) {
                    data.payments[index] = { ...data.payments[index], ...updates };
                    data.payments.sort((a, b) => b.timestamp - a.timestamp);
                    this.saveData(data);
                }
            },
            
            deletePayment(id) {
                const data = this.getData();
                data.payments = data.payments.filter(p => p.id !== id);
                this.saveData(data);
            }
        };

        let state = LocalDB.getData();
        let editingId = null;

        function getTodayISO() {
            const d = new Date();
            const tzOffset = d.getTimezoneOffset() * 60000;
            return new Date(d.getTime() - tzOffset).toISOString().split('T')[0]; 
        }
        function parseDateToISO(ptBrDate) {
            if (!ptBrDate) return getTodayISO();
            const parts = ptBrDate.split('/');
            if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`; 
            return getTodayISO();
        }
        function formatISOToPtBr(isoDate) {
            if (!isoDate) return new Date().toLocaleDateString('pt-BR');
            const parts = isoDate.split('-');
            if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`; 
            return new Date().toLocaleDateString('pt-BR');
        }
        function getTimestampFromISO(isoDate) {
            if (!isoDate) return Date.now();
            return new Date(isoDate + 'T12:00:00').getTime(); 
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.classList.add('splash-hidden');
                setTimeout(() => {
                    splash.remove();
                    document.getElementById('main-app').classList.remove('hidden');
                    
                    // Se o totalGoal for 0 e tivermos dados iniciais, forçar atualização
                    if (state.totalGoal === 0 || state.totalGoal === 4500) {
                        state.totalGoal = 3801;
                        LocalDB.setGoal(3801);
                    }
                    
                    render();
                }, 700);
            }, 1800); 
        });

        window.logoClick = (el) => {
            // Feedback visual
            el.style.transform = 'scale(0.9)';
            setTimeout(() => el.style.transform = 'scale(1)', 100);
            
            const actions = document.getElementById('secretActions');
            actions.classList.toggle('hidden');
            console.log('Comando secreto alternado');
        };

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('dateInput').value = getTodayISO();
            lucide.createIcons();
            if (typeof ChartDataLabels !== 'undefined') Chart.register(ChartDataLabels);
            
            // Ouvir atualizações do banco
            window.addEventListener('db-updated', () => {
                state = LocalDB.getData();
                render();
            });
        });

        let deferredPrompt;
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
        }
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e;
            document.getElementById('installAppBtn').classList.remove('hidden');
        });
        document.getElementById('installAppBtn').addEventListener('click', async () => {
            if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
        });

        window.openGoalModal = () => {
            document.getElementById('goalInput').value = state.totalGoal > 0 ? state.totalGoal : '';
            document.getElementById('goalModal').classList.add('active');
            setTimeout(() => document.getElementById('goalInput').focus(), 100);
        };

        window.closeGoalModal = () => document.getElementById('goalModal').classList.remove('active');

        document.getElementById('goalForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newVal = parseFloat(document.getElementById('goalInput').value.replace(',', '.'));
            if (!isNaN(newVal) && newVal >= 0) {
                LocalDB.setGoal(newVal);
                closeGoalModal();
            }
        });

        document.getElementById('addForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const amountInput = document.getElementById('amountInput');
            const descInput = document.getElementById('descInput');
            const dateInput = document.getElementById('dateInput');
            const value = parseFloat(amountInput.value.replace(',', '.'));
            
            if (isNaN(value) || value <= 0) return;

            const formattedDate = formatISOToPtBr(dateInput.value);
            let finalTimestamp = Date.now();

            if (editingId) {
                const existingPayment = state.payments.find(p => p.id === editingId);
                finalTimestamp = (existingPayment && existingPayment.date === formattedDate) ? existingPayment.timestamp : getTimestampFromISO(dateInput.value);
                
                LocalDB.updatePayment(editingId, {
                    description: descInput.value.trim(), 
                    amount: value, 
                    date: formattedDate, 
                    timestamp: finalTimestamp
                });
                window.cancelEdit();
            } else {
                if (dateInput.value !== getTodayISO()) finalTimestamp = getTimestampFromISO(dateInput.value);
                
                LocalDB.addPayment({
                    description: descInput.value.trim() || 'Pagamento', 
                    amount: value, 
                    date: formattedDate, 
                    timestamp: finalTimestamp
                });

                const btn = document.getElementById('submitBtn');
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<i data-lucide="check" size="20"></i> Salvo Localmente!';
                btn.classList.replace('bg-blue-600', 'bg-green-600');
                lucide.createIcons();
                setTimeout(() => { 
                    if(!editingId) { 
                        btn.innerHTML = originalHTML; 
                        btn.classList.replace('bg-green-600', 'bg-blue-600'); 
                        lucide.createIcons(); 
                    } 
                }, 1500);
            }
            amountInput.value = ''; descInput.value = ''; dateInput.value = getTodayISO();
            if(window.innerWidth > 768 && !editingId) descInput.focus();
        });

        window.startEdit = (id) => {
            const payment = state.payments.find(p => p.id === id);
            if(!payment) return;
            document.getElementById('descInput').value = payment.description;
            document.getElementById('amountInput').value = payment.amount;
            document.getElementById('dateInput').value = parseDateToISO(payment.date);
            editingId = id;
            
            const formContainer = document.getElementById('formContainer');
            formContainer.classList.replace('border-blue-600', 'border-amber-500');
            formContainer.classList.add('ring-2', 'ring-amber-100');
            document.getElementById('formTitle').innerHTML = '<span class="bg-amber-50 text-amber-600 rounded-lg p-1.5 border border-amber-100"><i data-lucide="pencil" size="18"></i></span> Editar Pagamento';
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerHTML = '<i data-lucide="refresh-cw" size="20"></i> Atualizar';
            submitBtn.className = "w-full text-white font-bold py-4 rounded-xl shadow-lg flex justify-center items-center gap-2 touch-target transition-transform active:scale-[0.98] bg-amber-500 hover:bg-amber-600 shadow-amber-200";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            lucide.createIcons();
            document.getElementById('addForm').scrollIntoView({behavior: 'smooth', block: 'center'});
        };

        window.cancelEdit = () => {
            editingId = null;
            document.getElementById('amountInput').value = ''; 
            document.getElementById('descInput').value = '';
            document.getElementById('dateInput').value = getTodayISO();
            
            const formContainer = document.getElementById('formContainer');
            formContainer.classList.replace('border-amber-500', 'border-blue-600');
            formContainer.classList.remove('ring-2', 'ring-amber-100');
            document.getElementById('formTitle').innerHTML = '<span class="bg-blue-50 text-blue-600 rounded-lg p-1.5 border border-blue-100"><i data-lucide="plus" size="18"></i></span> Registrar Pagamento';
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerHTML = '<i data-lucide="save" size="20"></i> Salvar Pagamento';
            submitBtn.className = "w-full text-white font-bold py-4 rounded-xl shadow-lg flex justify-center items-center gap-2 touch-target transition-transform active:scale-[0.98] bg-blue-600 active:bg-blue-700 shadow-blue-200";
            document.getElementById('cancelEditBtn').classList.add('hidden');
            lucide.createIcons();
        };

        window.deletePayment = (id) => {
            if(confirm('Apagar registro?')) {
                LocalDB.deletePayment(id);
                if(editingId === id) window.cancelEdit();
            }
        };
        
        const formatCurrency = (val) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);

        function render() {
            const totalPaid = state.payments.reduce((acc, curr) => acc + curr.amount, 0);
            const remaining = state.totalGoal - totalPaid;
            const progress = state.totalGoal > 0 ? Math.min(100, Math.max(0, (totalPaid / state.totalGoal) * 100)) : 0;
            
            document.getElementById('totalGoalDisplay').innerText = formatCurrency(state.totalGoal);
            document.getElementById('totalPaidDisplay').innerText = formatCurrency(totalPaid);
            document.getElementById('paymentCountDisplay').innerText = `${state.payments.length} pgto(s)`;
            
            const remainingEl = document.getElementById('remainingDisplay');
            remainingEl.innerText = formatCurrency(remaining);
            remainingEl.className = remaining <= 0 ? "text-xl md:text-2xl font-bold text-green-600" : "text-xl md:text-2xl font-bold text-red-600";
            
            document.getElementById('cardProgressBar').style.width = `${progress}%`;
            document.getElementById('mainProgressBar').style.width = `${progress}%`;
            document.getElementById('progressText').innerText = `${Math.round(progress)}%`;
            
            const listEl = document.getElementById('paymentsList');
            const emptyEl = document.getElementById('emptyState');
            
            if (state.payments.length === 0) { 
                listEl.classList.add('hidden'); emptyEl.classList.remove('hidden'); 
            } else {
                emptyEl.classList.add('hidden'); listEl.classList.remove('hidden'); listEl.innerHTML = '';
                state.payments.forEach(payment => {
                    const item = document.createElement('div');
                    item.className = "p-4 flex items-center justify-between hover:bg-slate-50 border-b border-slate-50 transition group";
                    const bgClass = editingId === payment.id ? "bg-amber-50 border-l-4 border-amber-400" : "";
                    
                    item.innerHTML = `
                        <div class="flex items-center gap-3 ${bgClass} rounded-lg p-2 transition-colors">
                            <div class="flex flex-col items-center justify-center bg-slate-50 text-slate-600 px-2 py-1.5 rounded-lg border border-slate-200 min-w-[60px] shadow-sm"><span class="text-[9px] font-bold uppercase tracking-wider text-slate-400">DATA</span><span class="text-xs font-bold">${payment.date.substring(0, 5)}</span></div>
                            <div class="overflow-hidden"><p class="font-bold text-slate-800 text-sm truncate pr-2">${payment.description}</p><p class="text-[10px] text-slate-400 truncate">Em ${payment.date}</p></div>
                        </div>
                        <div class="flex items-center gap-2 pl-2">
                            <span class="font-mono font-bold text-green-600 text-sm whitespace-nowrap mr-1">- ${formatCurrency(payment.amount)}</span>
                            <button onclick="startEdit('${payment.id}')" class="text-slate-300 hover:text-amber-500 p-2 rounded-full hover:bg-amber-50 transition active:scale-90" title="Editar"><i data-lucide="pencil" size="16"></i></button>
                            <button onclick="deletePayment('${payment.id}')" class="text-slate-300 hover:text-red-500 p-2 rounded-full hover:bg-red-50 transition active:scale-90" title="Excluir"><i data-lucide="trash-2" size="16"></i></button>
                        </div>
                    `;
                    listEl.appendChild(item);
                });
                lucide.createIcons();
            }
        }

        window.exportBackup = () => {
            const data = LocalDB.getData();
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Backup_Pagamentos_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.json`;
            a.click();
            URL.revokeObjectURL(url);
        };

        window.triggerRestore = () => document.getElementById('restoreFile').click();

        window.importBackup = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data && typeof data.totalGoal === 'number' && Array.isArray(data.payments)) {
                        if (confirm('Deseja restaurar este backup? Os dados atuais serão substituídos.')) {
                            LocalDB.saveData(data);
                            alert('Dados restaurados com sucesso!');
                        }
                    } else {
                        alert('Arquivo de backup inválido.');
                    }
                } catch (err) {
                    alert('Erro ao ler arquivo de backup.');
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // Reset input
        };

        async function generateChartImage(totalPaid, remaining) {
            const canvas = document.getElementById('excelChartCanvas');
            const ctx = canvas.getContext('2d');
            if (window.excelChart instanceof Chart) window.excelChart.destroy();
            return new Promise((resolve) => {
                window.excelChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: { labels: ['Pago', 'Restante'], datasets: [{ data: [totalPaid, Math.max(0, remaining)], backgroundColor: ['#16a34a', '#dc2626'], borderWidth: 0 }] },
                    options: { responsive: false, layout: { padding: 20 }, plugins: { legend: { position: 'bottom', labels: { font: { size: 24, weight: 'bold' }, padding: 20 } }, title: { display: true, text: 'Status do Pagamento', font: { size: 28, weight: 'bold' }, padding: { bottom: 20 } }, datalabels: { color: '#ffffff', font: { weight: 'bold', size: 18 }, formatter: (value) => value <= 0 ? '' : new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 0 }).format(value), anchor: 'center', align: 'center', backgroundColor: 'rgba(0,0,0,0.3)', borderRadius: 4, padding: 6 } }, animation: { onComplete: () => resolve(canvas.toDataURL('image/png')) } },
                    plugins: [ChartDataLabels]
                });
            });
        }

        window.exportToExcel = async () => {
            if (state.payments.length === 0) { alert("Sem dados para exportar."); return; }
            const totalPaid = state.payments.reduce((acc, curr) => acc + curr.amount, 0);
            const remaining = state.totalGoal - totalPaid;
            const chartBase64 = await generateChartImage(totalPaid, remaining);
            const workbook = new ExcelJS.Workbook();
            const worksheet = workbook.addWorksheet('Pagamentos', { views: [{ showGridLines: false }] });
            worksheet.columns = [{ header: 'Data', key: 'date', width: 15 }, { header: 'Descrição', key: 'description', width: 30 }, { header: 'Valor (R$)', key: 'amount', width: 20 }, { width: 5 }, { width: 60 }];
            const headerRow = worksheet.getRow(1);
            headerRow.font = { bold: true, color: { argb: 'FFFFFFFF' } }; headerRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF2563EB' } }; headerRow.alignment = { horizontal: 'center' };
            state.payments.forEach(p => {
                const row = worksheet.addRow({ date: p.date, description: p.description, amount: p.amount });
                row.getCell('amount').numFmt = '"R$" #,##0.00'; row.getCell('date').alignment = { horizontal: 'center' };
                row.eachCell((cell) => { if(cell.col <= 3) cell.border = { top: { style: 'thin' }, left: { style: 'thin' }, bottom: { style: 'thin' }, right: { style: 'thin' } }; });
            });
            const totalRow = worksheet.addRow({ description: 'TOTAL PAGO:', amount: totalPaid });
            totalRow.font = { bold: true }; totalRow.getCell('description').alignment = { horizontal: 'right' }; totalRow.getCell('amount').numFmt = '"R$" #,##0.00'; totalRow.getCell('amount').fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFDCFCE7' } };
            totalRow.getCell('description').border = { top: { style: 'thin' }, left: { style: 'thin' }, bottom: { style: 'thin' }, right: { style: 'thin' } }; totalRow.getCell('amount').border = { top: { style: 'thin' }, left: { style: 'thin' }, bottom: { style: 'thin' }, right: { style: 'thin' } };
            const imageId = workbook.addImage({ base64: chartBase64, extension: 'png' });
            worksheet.addImage(imageId, { tl: { col: 4, row: 1 }, br: { col: 5, row: 22 } });
            const buffer = await workbook.xlsx.writeBuffer();
            saveAs(new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }), `Controle_Pagamentos_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.xlsx`);
        };

        window.exportToPDF = async () => {
            if (state.payments.length === 0) { alert("Sem dados para exportar."); return; }
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.setFillColor(30, 41, 59); doc.rect(0, 0, 210, 30, 'F'); doc.setFontSize(18); doc.setFont("helvetica", "bold"); doc.setTextColor(255, 255, 255); doc.text("Comprovante de Pagamentos", 105, 18, { align: 'center' }); 
            const dataEmissao = new Date().toLocaleDateString('pt-BR'); const horaEmissao = new Date().toLocaleTimeString('pt-BR');
            doc.setFontSize(10); doc.setTextColor(71, 85, 105); doc.text(`Emitido em: ${dataEmissao} às ${horaEmissao}`, 14, 40);
            const totalPaid = state.payments.reduce((acc, curr) => acc + curr.amount, 0); const remaining = state.totalGoal - totalPaid;
            const boxY = 48; const boxHeight = 22; const boxWidth = 58; const gap = 6; const startX = 14;
            function drawStatBox(x, label, value, bgColor, txtColor) {
                doc.setDrawColor(200, 200, 200); doc.setFillColor(bgColor[0], bgColor[1], bgColor[2]); doc.roundedRect(x, boxY, boxWidth, boxHeight, 2, 2, 'FD');
                doc.setFontSize(9); doc.setTextColor(100, 100, 100); doc.text(label, x + (boxWidth/2), boxY + 7, { align: 'center' });
                doc.setFontSize(12); doc.setFont("helvetica", "bold"); doc.setTextColor(txtColor[0], txtColor[1], txtColor[2]); doc.text(value, x + (boxWidth/2), boxY + 16, { align: 'center' });
            }
            drawStatBox(startX, "VALOR TOTAL", formatCurrency(state.totalGoal), [255, 255, 255], [30, 41, 59]);
            drawStatBox(startX + boxWidth + gap, "JÁ PAGO", formatCurrency(totalPaid), [240, 253, 244], [22, 163, 74]);
            drawStatBox(startX + (boxWidth + gap)*2, "SALDO A PAGAR", formatCurrency(remaining), [254, 242, 242], [220, 38, 38]);
            const tableRows = state.payments.map(payment => [payment.date, payment.description.toUpperCase(), formatCurrency(payment.amount)]);
            doc.autoTable({ head: [["DATA", "DESCRIÇÃO", "VALOR"]], body: tableRows, startY: boxY + boxHeight + 15, theme: 'striped', styles: { fontSize: 12, cellPadding: 6, textColor: [51, 65, 85], lineWidth: 0.1, lineColor: [203, 213, 225] }, headStyles: { fillColor: [51, 65, 85], textColor: [255, 255, 255], fontStyle: 'bold', halign: 'center', fontSize: 12 }, columnStyles: { 0: { cellWidth: 40, halign: 'center' }, 1: { cellWidth: 'auto' }, 2: { cellWidth: 50, halign: 'right', fontStyle: 'bold' } }, foot: [['', 'TOTAL GERAL', formatCurrency(totalPaid)]], footStyles: { fillColor: [241, 245, 249], textColor: [30, 41, 59], fontStyle: 'bold', halign: 'right', fontSize: 14 } });
            doc.save(`Comprovante_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.pdf`);
        };
    </script>
</body>
</html>
